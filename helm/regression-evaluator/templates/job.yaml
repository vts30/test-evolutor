{{- $reporters := .Values.job.reporters | join " " }}
{{- $sloConfigMapName := .Values.sloConfig.existingConfigMap | default (printf "%s-slo" (include "regression-evaluator.fullname" .)) }}
{{- $cmd := printf "regression-evaluator --db-uri \"${DB_URI}\" --current-run %s" (.Values.job.currentRun | quote) }}
{{- if .Values.job.baselineRun }}
{{- $cmd = printf "%s --baseline-run %s" $cmd (.Values.job.baselineRun | quote) }}
{{- else }}
{{- $cmd = printf "%s --baseline-strategy %s" $cmd (.Values.job.baselineStrategy | quote) }}
{{- end }}
{{- if .Values.sloConfig.enabled }}
{{- $cmd = printf "%s --slo-config /config/slo.yaml" $cmd }}
{{- end }}
{{- $cmd = printf "%s --reporters %s" $cmd $reporters }}
{{- if .Values.job.outputPath }}
{{- $cmd = printf "%s --output %s" $cmd .Values.job.outputPath }}
{{- end }}
{{- if .Values.job.releaseGate }}
{{- $cmd = printf "%s --release-gate" $cmd }}
{{- end }}
{{- if .Values.job.enableClustering }}
{{- $cmd = printf "%s --enable-clustering" $cmd }}
{{- end }}
{{- $cmd = printf "%s --log-level %s" $cmd .Values.job.logLevel }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "regression-evaluator.fullname" . }}
  labels:
    {{- include "regression-evaluator.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "regression-evaluator.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: regression-evaluator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set +e
              DB_URI="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
              if [ -n "${DB_SCHEMA:-}" ]; then
                DB_URI="${DB_URI}?options=-c%20search_path%3D${DB_SCHEMA}"
              fi
              {{- if .Values.job.outputPath }}
              OUTPUT_DIR="$(dirname '{{ .Values.job.outputPath }}')"
              [ -n "$OUTPUT_DIR" ] && mkdir -p "$OUTPUT_DIR"
              {{- end }}
              {{ $cmd }}
              rc=$?
              set -e
              echo $rc > {{ .Values.job.controlDir }}/exitcode
              touch {{ .Values.job.controlDir }}/done
              echo "regression-evaluator exited $rc; sleeping {{ .Values.job.copyGraceSeconds }}s so the report can be copied out before the pod terminates"
              sleep {{ .Values.job.copyGraceSeconds }}
              exit $rc
          env:
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.db.user | quote }}
            - name: DB_SCHEMA
              value: {{ .Values.db.schema | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "regression-evaluator.secretName" . }}
                  key: {{ .Values.db.existingSecretPasswordKey }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.sloConfig.enabled .Values.output.persistence.enabled }}
          volumeMounts:
            {{- if .Values.sloConfig.enabled }}
            - name: slo-config
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- if .Values.output.persistence.enabled }}
            - name: output
              mountPath: {{ .Values.output.persistence.mountPath }}
            {{- end }}
          {{- end }}
      {{- if or .Values.sloConfig.enabled .Values.output.persistence.enabled }}
      volumes:
        {{- if .Values.sloConfig.enabled }}
        - name: slo-config
          configMap:
            name: {{ $sloConfigMapName }}
        {{- end }}
        {{- if .Values.output.persistence.enabled }}
        - name: output
          persistentVolumeClaim:
            claimName: {{ .Values.output.persistence.existingClaim }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
